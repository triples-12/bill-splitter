<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>割り勘計算</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d2c3e;
    --paper: #f8fafc;
    --amber: #FF8709;
    --amber-light: #ffa040;
    --amber-pale: #fff3e0;
    --red: #c0392b;
    --green: #1a6b3c;
    --line: #d4e2ec;
    --muted: #7a9ab0;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,64,103,0.04) 28px);
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    background: #004067; padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--amber);
  }
  .header-icon { display: flex; align-items: center; flex-shrink: 0; }
  header h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 0.05em;
    white-space: nowrap;
  }
  header .subtitle { font-size: 10px; color: var(--amber-light); letter-spacing: 0.12em; margin-top: 1px; white-space: nowrap; }
  .header-text { min-width: 0; }
  .share-banner {
    margin: 0 0 0 auto;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .share-btn {
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 12px;
    background: var(--amber); color: #fff; border: none; border-radius: 8px;
    padding: 7px 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
    white-space: nowrap;   /* ★ 折り返し防止 */
    flex-shrink: 0;
  }
  .share-btn:hover { background: var(--amber-light); }
  .share-copied { font-size: 12px; color: var(--amber-light); opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
  .share-copied.show { opacity: 1; }

  main { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

  /* ── Readonly banner ─────────────────────────────── */
  .readonly-banner {
    background: var(--amber-pale); border: 1.5px solid var(--amber);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
    font-size: 13px; display: flex; align-items: center; gap: 10px;
  }
  .readonly-banner strong { font-weight: 700; }

  .sec-title {
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .card { background: var(--card); border-radius: 12px; border: 1px solid var(--line); padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

  /* ── Member chips ────────────────────────────────── */
  .member-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 20px; }
  .chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--amber-pale); border: 1.5px solid var(--amber);
    border-radius: 20px; padding: 5px 12px 5px 6px;
    font-size: 13px; font-weight: 500; animation: pop 0.2s ease;
  }
  @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .chip-animal { width: 24px; height: 24px; flex-shrink: 0; }
  .chip-del { background: none; border: none; cursor: pointer; color: var(--amber); font-size: 16px; padding: 0; line-height: 1; }
  .chip-del:hover { color: var(--red); }
  .add-member-row { display: flex; gap: 8px; align-items: center; }

  input[type="text"], input[type="number"] {
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
    border: 1.5px solid var(--line); border-radius: 8px; padding: 8px 12px;
    outline: none; background: var(--paper); color: var(--ink); transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: var(--amber); background: #fff; }

  .btn {
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 0.05em; border: none; border-radius: 8px; padding: 9px 16px;
    cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-amber { background: var(--amber); color: #fff; }
  .btn-amber:hover { background: var(--amber-light); transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--amber); border: 1.5px solid var(--amber); }
  .btn-outline:hover { background: var(--amber-pale); }
  .btn-red { background: transparent; color: var(--red); border: 1.5px solid #e8c5c0; font-size: 12px; padding: 6px 10px; }
  .btn-red:hover { background: #fdf0ef; }
  .btn-green { background: var(--green); color: #fff; padding: 11px 24px; font-size: 15px; }
  .btn-green:hover { background: #1e7d48; transform: translateY(-1px); }
  .btn-xs { font-size: 11px !important; padding: 4px 10px !important; border-radius: 6px !important; }

  /* ── Bill rows ───────────────────────────────────── */
  .bill-row { border: 1.5px solid var(--line); border-radius: 10px; padding: 16px; margin-bottom: 14px; background: #fdfdfc; position: relative; }
  .bill-num {
    position: absolute; top: -1px; left: 14px;
    background: var(--ink); color: var(--amber-light);
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    padding: 2px 10px; border-radius: 0 0 6px 6px;
  }
  .bill-row-header { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: start; margin-bottom: 14px; }
  .bill-amount-wrap { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .bill-amount-label { font-size: 11px; color: var(--muted); }
  .amount-input { width: 140px; text-align: right; font-weight: 700; font-size: 16px; }
  .payer-wrap { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .payer-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .payer-select {
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    border: 1.5px solid var(--line); border-radius: 8px; padding: 7px 10px;
    background: var(--paper); color: var(--ink); cursor: pointer; outline: none;
  }
  .payer-select:focus { border-color: var(--amber); }
  .sub-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  .dividers-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .all-check-row { display: flex; gap: 8px; margin-bottom: 8px; }

  .divider-btn {
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    padding: 5px 12px 5px 6px; border-radius: 20px;
    border: 1.5px solid var(--line); background: var(--paper); color: var(--muted);
    cursor: pointer; transition: background 0.12s, border-color 0.12s, color 0.12s;
    user-select: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .divider-btn.is-active { background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 600; }
  .divider-btn .chk-icon { font-size: 11px; line-height: 1; min-width: 10px; }
  .divider-btn .d-animal { width: 20px; height: 20px; flex-shrink: 0; }

  /* ── Split table ─────────────────────────────────── */
  .split-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  .split-table th { text-align: left; font-size: 11px; font-weight: 500; color: var(--muted); padding: 4px 8px; letter-spacing: 0.08em; border-bottom: 1px solid var(--line); }
  .split-table td { padding: 6px 8px; border-bottom: 1px solid #f0ebe0; vertical-align: middle; }
  .split-amount-cell { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
  .yen-sym { color: var(--muted); font-size: 12px; }
  .member-cell { display: flex; align-items: center; gap: 7px; font-weight: 500; }
  .tbl-animal { width: 20px; height: 20px; }

  .split-input {
    width: 120px; text-align: right; font-size: 14px; font-weight: 500;
    padding: 6px 10px; border-radius: 6px;
    border: 1.5px solid var(--line); background: var(--paper); color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif; outline: none;
    -moz-appearance: textfield;
  }
  .split-input::-webkit-outer-spin-button,
  .split-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .split-input:focus { border-color: var(--amber); background: #fff; }
  .split-input.modified { border-color: var(--amber); background: var(--amber-pale); font-weight: 700; }

  .reset-btn {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 15px; padding: 0 3px; line-height: 1; opacity: 0; pointer-events: none;
  }
  .reset-btn.visible { opacity: 1; pointer-events: auto; }
  .reset-btn:hover { color: var(--red); }

  .recalc-note { font-size: 11px; color: var(--muted); margin-top: 6px; font-style: italic; }
  hr.section-hr { border: none; border-top: 1px dashed var(--line); margin: 16px 0; }
  .spacer { margin-top: 6px; }
  .total-badge {
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 13px;
    background: var(--ink); color: var(--amber-light); padding: 3px 10px; border-radius: 6px; margin-left: 8px;
  }

  /* ── Summary ─────────────────────────────────────── */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .member-summary-card { border: 1.5px solid var(--line); border-radius: 10px; padding: 14px 16px; background: var(--card); }
  .member-name-lbl {
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 15px;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
  }
  .summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 4px; }
  .summary-row .lbl { color: var(--muted); }
  .summary-row .val { font-weight: 600; }
  .net-amount { margin-top: 10px; padding-top: 8px; border-top: 2px solid var(--ink); display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; }
  .net-positive { color: var(--green); }
  .net-negative { color: var(--red); }
  .net-zero { color: var(--muted); }

  /* ── Transfers ───────────────────────────────────── */
  .transfer-list { display: flex; flex-direction: column; gap: 10px; }
  .transfer-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1.5px solid var(--line); border-radius: 10px;
    padding: 12px 16px; font-size: 14px; animation: slideIn 0.25s ease both;
  }
  @keyframes slideIn { from { transform: translateX(-8px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .transfer-from { font-weight: 700; background: var(--red); color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 13px; display: flex; align-items: center; gap: 5px; }
  .transfer-arrow { font-size: 18px; color: var(--muted); }
  .transfer-to { font-weight: 700; background: var(--green); color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 13px; display: flex; align-items: center; gap: 5px; }
  .transfer-amount { margin-left: auto; font-weight: 900; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 17px; }
  .no-transfer { text-align: center; padding: 24px; color: var(--green); font-weight: 700; font-size: 15px; }
  .t-animal { width: 16px; height: 16px; }

  /* ── Share result button ─────────────────────────────── */
  .share-result-btn {
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 13px;
    background: var(--header, #004067); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
    transition: background 0.15s; letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .share-result-btn:hover { background: #005a8a; }
  .result-copied { font-size: 12px; color: var(--amber); opacity: 0; transition: opacity 0.3s; margin-left: 10px; white-space: nowrap; }
  .result-copied.show { opacity: 1; }

  /* ── Event title ─────────────────────────────────── */
  .event-title-wrap {
    margin-bottom: 20px;
  }
  .event-title-input {
    width: 100%;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-bottom: 2px solid var(--line);
    border-radius: 0;
    padding: 8px 2px;
    background: transparent;
    color: var(--ink);
    outline: none;
    letter-spacing: 0.03em;
    transition: border-color 0.15s;
  }
  .event-title-input:focus { border-bottom-color: var(--amber); }
  .event-title-input::placeholder { color: var(--muted); font-weight: 500; font-size: 16px; }
  .event-title-display {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: 0.03em;
    padding: 6px 2px;
  }

  /* ── Currency ───────────────────────────────────── */
  .currency-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-top: 10px;
  }
  .currency-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .currency-select {
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    border: 1.5px solid var(--line); border-radius: 8px; padding: 6px 10px;
    background: var(--paper); color: var(--ink); cursor: pointer; outline: none;
  }
  .currency-select:focus { border-color: var(--amber); }
  .rate-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--paper); border: 1.5px solid var(--line);
    border-radius: 8px; padding: 5px 10px; cursor: pointer;
    font-size: 12px; color: var(--muted); transition: border-color 0.12s;
    white-space: nowrap;
  }
  .rate-badge:hover { border-color: var(--amber); color: var(--ink); }
  .rate-badge .rate-val { font-weight: 700; color: var(--ink); }
  .rate-edit-wrap {
    display: none; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .rate-edit-wrap.open { display: flex; }
  .rate-edit-input {
    width: 90px; text-align: right; font-size: 14px; font-weight: 700;
    padding: 5px 8px; border-radius: 6px;
    border: 1.5px solid var(--amber); background: var(--amber-pale); color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif; outline: none;
    -moz-appearance: textfield;
  }
  .rate-edit-input::-webkit-outer-spin-button,
  .rate-edit-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .rate-refresh-btn {
    font-size: 11px; padding: 5px 10px; border-radius: 6px;
    background: transparent; color: var(--muted); border: 1.5px solid var(--line);
    cursor: pointer; white-space: nowrap;
  }
  .rate-refresh-btn:hover { border-color: var(--amber); color: var(--amber); }
  .jpy-hint {
    font-size: 11px; color: var(--muted); margin-top: 3px; text-align: right;
    min-height: 14px;
  }
  .jpy-hint.active { color: var(--amber); font-weight: 500; }
  .transfer-jpy { font-size: 11px; color: var(--muted); text-align: right; margin-top: 1px; }
  .rate-loading { font-size: 11px; color: var(--muted); font-style: italic; }

</style>
</head>
<body>

<header>
  <div class="header-icon">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="10" width="19" height="20" rx="2" fill="none" stroke="#FF8709" stroke-width="2.2"/>
      <path d="M23 14 Q31 14 31 20 Q31 26 23 26" fill="none" stroke="#FF8709" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M4 10 Q6.5 6 9 10 Q11.5 6 14 10 Q16.5 6 19 10 Q21.5 6 23 10" fill="none" stroke="#FF8709" stroke-width="2" stroke-linecap="round"/>
      <line x1="7" y1="19" x2="20" y2="19" stroke="#FF870930" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div>
    <h1>割り勘計算</h1>
    <div class="subtitle">BILL SPLITTER</div>
  </div>
  <div class="share-banner">
    <button class="share-btn" id="shareBtn" onclick="shareUrl()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      URLをコピー
    </button>
    <span class="share-copied" id="shareCopied">✓ コピーしました</span>
  </div>
</header>

<main>
  <div id="connectingBanner" class="readonly-banner" style="display:none;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>接続中...</span>
  </div>
  <div id="newEventBanner" class="readonly-banner" style="display:none;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>新しいイベントを作成するには <a href="?" style="color:var(--amber);font-weight:700;">こちら</a></span>
  </div>

  <div class="event-title-wrap">
    <input type="text" id="eventTitleInput" class="event-title-input"
      placeholder="イベント名を入力（例: 5/1 BBQ大会）"
      oninput="onTitleInput(this.value)">
  </div>

  <div class="sec-title">参加者</div>
  <div class="card">
    <div class="member-chips" id="memberChips"></div>
    <div class="add-member-row" id="addMemberRow">
      <input type="text" id="memberInput" placeholder="名前を入力..." style="flex:1;max-width:220px;">
      <button class="btn btn-amber" onclick="addMember()">＋ 追加</button>
    </div>
  </div>

  <div class="sec-title">
    会計
    <span class="total-badge" id="grandTotalBadge">合計: ¥0</span>
  </div>
  <div id="billsContainer"></div>
  <button class="btn btn-outline" id="addBillBtn" style="width:100%;margin-bottom:20px;" onclick="addBill()">＋ 会計を追加</button>

  <button class="btn btn-green" id="calcBtn" style="width:100%;border-radius:10px;margin-bottom:24px;" onclick="calculate()">
    ⚡ 精算を計算する
  </button>

  <div id="summarySection" style="display:none;">
    <div class="sec-title">メンバー別サマリー</div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="sec-title">精算方法</div>
    <div class="card">
      <div class="transfer-list" id="transferList"></div>
      <div id="shareResultWrap" style="display:none; margin-top:16px; padding-top:14px; border-top:1px dashed var(--line);">
        <button class="share-result-btn" onclick="shareResult()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          精算結果をシェア
        </button>
        <span class="result-copied" id="resultCopied">✓ コピーしました</span>
      </div>
    </div>
  </div>
</main>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDXgZG_yzDAoci40bEqOhh-kEoc7honNCU",
  authDomain:        "billsplitter-df48f.firebaseapp.com",
  databaseURL:       "https://billsplitter-df48f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "billsplitter-df48f",
  storageBucket:     "billsplitter-df48f.firebasestorage.app",
  messagingSenderId: "55897555733",
  appId:             "1:55897555733:web:cf8d83683f8e58760d5f1c"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

function getRoomId() {
  return new URLSearchParams(location.search).get('room');
}

let saveTimer = null;
function scheduleSave() {
  if (!currentRoomId) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToFirebase(), 600);
}

async function saveToFirebase() {
  if (!currentRoomId) return;
  const data = {
    title:     eventTitle,
    members:   members.map(m => ({ n: m.name, a: m.animalIdx })),
    bills:     bills.map(b => ({
      id:  b.id, desc: b.desc, amt: b.amount,
      pay: b.payer, div: b.dividers, ovr: b.overrides,
      cur: b.currency, rate: b.rate
    })),
    billId, animalIdx, ts: Date.now()
  };
  await set(ref(db, 'rooms/' + currentRoomId), data);
}

let isRemoteUpdate = false;
function subscribeRoom(roomId) {
  document.getElementById('connectingBanner').style.display = 'flex';
  onValue(ref(db, 'rooms/' + roomId), (snapshot) => {
    document.getElementById('connectingBanner').style.display = 'none';
    document.getElementById('newEventBanner').style.display   = 'flex';
    const data = snapshot.val();
    if (!data) return;
    isRemoteUpdate = true;
    eventTitle = data.title || '';
    members    = (data.members||[]).map(m => ({ name: m.n, animalIdx: m.a }));
    billId     = data.billId   || 0;
    animalIdx  = data.animalIdx || members.length;
    bills      = (data.bills||[]).map(b => ({
      id: b.id, desc: b.desc||'', amount: b.amt||0,
      payer: b.pay||'', dividers: b.div||[], overrides: b.ovr||({}),
      currency: b.cur||'JPY', rate: b.rate||1
    }));
    const titleInp = document.getElementById('eventTitleInput');
    if (titleInp) titleInp.value = eventTitle;
    renderMembers();
    document.getElementById('billsContainer').innerHTML = '';
    bills.forEach(b => {
      const wrap = document.createElement('div');
      wrap.className = 'bill-row'; wrap.id = 'bill-' + b.id;
      document.getElementById('billsContainer').appendChild(wrap);
      refreshBillUI(b.id);
    });
    updateGrandTotal();
    isRemoteUpdate = false;
  });
}

window.__firebaseSave = scheduleSave;
window.addEventListener('DOMContentLoaded', async () => {
  const roomId = getRoomId();
  if (roomId) {
    currentRoomId = roomId;
    subscribeRoom(roomId);
  }
  document.getElementById('memberInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addMember();
  });
});
window.__dbSet = (path, data) => set(ref(db, path), data);
</script>

// ── 通貨定義 ──────────────────────────────────────────────────────────
const CURRENCIES = [
  { code:'JPY', symbol:'¥',  flag:'🇯🇵', name:'日本円' },
  { code:'USD', symbol:'$',  flag:'🇺🇸', name:'米ドル' },
  { code:'EUR', symbol:'€',  flag:'🇪🇺', name:'ユーロ' },
  { code:'GBP', symbol:'£',  flag:'🇬🇧', name:'英ポンド' },
  { code:'KRW', symbol:'₩',  flag:'🇰🇷', name:'韓国ウォン' },
  { code:'CNY', symbol:'¥',  flag:'🇨🇳', name:'人民元' },
  { code:'THB', symbol:'฿',  flag:'🇹🇭', name:'タイバーツ' },
  { code:'AUD', symbol:'A$', flag:'🇦🇺', name:'豪ドル' },
  { code:'SGD', symbol:'S$', flag:'🇸🇬', name:'シンガポールドル' },
  { code:'HKD', symbol:'HK$',flag:'🇭🇰', name:'香港ドル' },
  { code:'TWD', symbol:'NT$',flag:'🇹🇼', name:'台湾ドル' },
  { code:'MYR', symbol:'RM', flag:'🇲🇾', name:'マレーシアリンギット' },
];

function getCurrency(code) { return CURRENCIES.find(c=>c.code===code) || CURRENCIES[0]; }

// ── 為替レートキャッシュ（JPYベース） ────────────────────────────────
// rates[code] = 1 code あたりの JPY
// ── 為替レート: メモリキャッシュ + localStorage永続化 ─────────────
const rateCache = { JPY: 1 };
const LS_KEY = 'warikan_rates';

// 起動時にlocalStorageから復元
(function loadStoredRates() {
  try {
    const stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    Object.entries(stored).forEach(([code, entry]) => {
      // 24時間以内のデータは復元
      if (entry && entry.rate && Date.now() - (entry.ts||0) < 24*60*60*1000) {
        rateCache[code] = entry.rate;
      }
    });
  } catch(e) {}
})();

function saveRateToLS(code, rate) {
  try {
    const stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    stored[code] = { rate, ts: Date.now() };
    localStorage.setItem(LS_KEY, JSON.stringify(stored));
  } catch(e) {}
}

function getStoredRate(code) {
  try {
    const stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    const entry  = stored[code];
    if (entry && entry.rate) return { rate: entry.rate, ts: entry.ts };
  } catch(e) {}
  return null;
}

// コードごとの最終取得時刻（メモリ）
const rateFetchedAt = {};

async function fetchRate(code) {
  if (code === 'JPY') return 1;

  // メモリキャッシュ（10分以内）
  if (rateCache[code] && rateFetchedAt[code] && Date.now() - rateFetchedAt[code] < 10*60*1000) {
    return rateCache[code];
  }

  // API1: open.er-api.com
  try {
    const res  = await Promise.race([
      fetch(`https://open.er-api.com/v6/latest/${code}`),
      new Promise((_,rej) => setTimeout(()=>rej(new Error('timeout')), 5000))
    ]);
    const json = await res.json();
    if (json.result === 'success' && json.rates?.JPY) {
      const rate = json.rates['JPY'];
      rateCache[code]      = rate;
      rateFetchedAt[code]  = Date.now();
      saveRateToLS(code, rate);
      return rate;
    }
  } catch(e) {}

  // API2: frankfurter.app (フォールバック)
  try {
    const res  = await Promise.race([
      fetch(`https://api.frankfurter.app/latest?from=${code}&to=JPY`),
      new Promise((_,rej) => setTimeout(()=>rej(new Error('timeout')), 5000))
    ]);
    const json = await res.json();
    if (json.rates?.JPY) {
      const rate = json.rates['JPY'];
      rateCache[code]      = rate;
      rateFetchedAt[code]  = Date.now();
      saveRateToLS(code, rate);
      return rate;
    }
  } catch(e) {}

  // localStorage の過去データを使う
  const stored = getStoredRate(code);
  if (stored) {
    rateCache[code] = stored.rate;
    return stored.rate;
  }

  // メモリキャッシュの古いデータも使う
  if (rateCache[code]) return rateCache[code];

  return null;
}

function toJPY(amount, currency, rate) {
  if (currency === 'JPY') return amount;
  return Math.round(amount * rate);
}

function fmtCurrency(amount, code) {
  const c = getCurrency(code);
  if (code === 'KRW' || code === 'JPY') {
    return c.symbol + Math.round(amount).toLocaleString();
  }
  return c.symbol + Number(amount).toFixed(2);
}

async function ensureRoom() {

  currentRoomId = Math.random().toString(36).slice(2,8).toUpperCase();
  const url = new URL(location.href);
  url.searchParams.set('room', currentRoomId);
  history.replaceState(null, '', url.toString());

// ── URLシェア ─────────────────────────────────────────────────────────
function shareUrl() {
  const url = location.href;
  function showCopied() {
    const el = document.getElementById('shareCopied');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(showCopied).catch(() => fallbackCopy(url, showCopied));
  } else {
    fallbackCopy(url, showCopied);
  }
}
function fallbackCopy(url, cb) {
  const ta = document.createElement('textarea');
  ta.value = url; ta.style.cssText = 'position:fixed;top:-999px;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  if (document.execCommand('copy')) cb();
  else prompt('URLをコピーしてシェアしてください:', url);
  document.body.removeChild(ta);
}

async function initRate(id) {
  const b = getBill(id);
  if (b.currency === 'JPY') return;
  const loadingEl = document.getElementById(`rate-loading-${id}`);
  const badgeEl   = document.getElementById(`rate-badge-${id}`);
  if (loadingEl) loadingEl.style.display = '';
  if (badgeEl)   badgeEl.style.display   = 'none';
  const rate = await fetchRate(b.currency);
  if (rate) {
    b.rate = rate;
    rateCache[b.currency] = rate;
    const valEl = document.getElementById(`rate-val-${id}`);
    if (valEl)      valEl.textContent   = rate.toFixed(2);
    if (loadingEl)  loadingEl.style.display = 'none';
    if (badgeEl)    badgeEl.style.display   = '';
    const inp = document.getElementById(`rate-input-${id}`);
    if (inp) inp.value = rate.toFixed(2);
    updateJpyHint(id, b.amount);
    renderSplitTable(id);
    save();
  } else {
    // 失敗時: 過去のlocalStorageデータがあれば使用、なければ手動入力を開く
    const stored = getStoredRate(b.currency);
    if (stored) {
      const hrs = Math.round((Date.now() - stored.ts) / 3600000);
      b.rate = stored.rate;
      rateCache[b.currency] = stored.rate;
      const valEl = document.getElementById(`rate-val-${id}`);
      if (valEl) valEl.textContent = stored.rate.toFixed(2);
      if (loadingEl) loadingEl.style.display = 'none';
      if (badgeEl) {
        badgeEl.style.display = '';
        badgeEl.title = `取得失敗 — ${hrs}時間前のデータを使用`;
        badgeEl.style.borderColor = 'var(--amber)';
      }
      const inp = document.getElementById(`rate-input-${id}`);
      if (inp) inp.value = stored.rate.toFixed(2);
      updateJpyHint(id, b.amount);
      renderSplitTable(id);
      save();
    } else {
      // 過去データもない → 手動入力モードを即座に開く
      if (loadingEl) loadingEl.style.display = 'none';
      if (badgeEl)   badgeEl.style.display   = 'none';
      const edit = document.getElementById(`rate-edit-${id}`);
      if (edit) {
        edit.classList.add('open');
        const inp = document.getElementById(`rate-input-${id}`);
        if (inp) {
          inp.placeholder = 'レートを入力';
          inp.focus();
        }
        // 取得失敗メッセージをeditの前に表示
        const msg = document.createElement('span');
        msg.style.cssText = 'font-size:11px;color:var(--red);white-space:nowrap;';
        msg.textContent = 'レート取得失敗 — 手動で入力してください';
        msg.id = `rate-err-${id}`;
        if (!document.getElementById(`rate-err-${id}`)) {
          edit.parentNode.insertBefore(msg, edit);
        }
      }
    }
  }
}

// ── Split table ────────────────────────────────────────────────────────
function computeSplits(b) {
  const {dividers,overrides,amount}=b;
  if (!dividers.length||!amount) return {};
  const fixed=dividers.filter(d=>overrides[d]!==undefined);
  const free =dividers.filter(d=>overrides[d]===undefined);
  const fixedSum=fixed.reduce((s,d)=>s+overrides[d],0);
  const perFree=free.length?Math.round((amount-fixedSum)/free.length):0;
  const result={};
  dividers.forEach(d=>{result[d]=overrides[d]!==undefined?overrides[d]:perFree;});
  return result;
}

function renderSplitTable(id) {
  const b=getBill(id);
  const cont=document.getElementById(`split-table-${id}`);

    return;
  }
  const cur=getCurrency(b.currency);
  const splits=computeSplits(b);
  const splitSum=Object.values(splits).reduce((s,v)=>s+v,0);
  const diff=Math.abs(splitSum-b.amount);
  cont.innerHTML=`
    <table class="split-table">

        <th style="text-align:right">割り勘額</th>

          return `<tr>
            <td><div class="member-cell">
              <span class="tbl-animal">${getAnimalSvg(ai,18,'var(--muted)')}</span>${esc(d)}
            </div></td>
            <td>
              <div class="split-amount-cell">
                <span class="yen-sym">${cur.symbol}</span>
                <input type="number" class="split-input${isOvr?' modified':''}"
                  value="${splits[d]??0}"
                  onfocus="this.select()"
                  onkeydown="if(event.key==='Enter')this.blur()"
                  onchange="onSplitChange(${id},'${ea(d)}',this)">
              </div>

            </td>
            <td><button class="reset-btn${isOvr?' visible':''}" title="均等に戻す" onclick="resetOverride(${id},'${ea(d)}')">↺</button></td>
          </tr>`;
        }).join('')}
        <tr id="split-total-${id}" style="background:var(--amber-pale)">
          <td style="font-weight:700;font-size:12px;color:var(--muted)">合計</td>
          <td style="text-align:right;font-weight:700" colspan="2">
            ${cur.symbol}${splitSum.toLocaleString()}
            ${b.currency!=='JPY'?`<div class="jpy-hint active">≈ ¥${toJPY(splitSum,b.currency,b.rate).toLocaleString()}</div>`:''}
            ${diff>1?`<div style="color:var(--red);font-size:11px;">（差額 ${cur.symbol}${Math.round(diff)}）</div>`:''}
          </td>
        </tr>
      </tbody>
    </table>`;
}

function onSplitChange(id,name,inputEl) {
  const b=getBill(id);
  b.overrides[name]=parseFloat(inputEl.value)||0;
  inputEl.classList.add('modified');
  const rb=inputEl.closest('tr')?.querySelector('.reset-btn');
  if (rb) rb.classList.add('visible');
  const splits=computeSplits(b);
  const cont=document.getElementById(`split-table-${id}`);
  if (!cont) return;
  cont.querySelectorAll('tbody .split-input').forEach((inp,i)=>{
    const member=b.dividers[i];
    if (!member||member===name||b.overrides[member]!==undefined) return;
    inp.value=splits[member]??0;
  });
  const splitSum=Object.values(splits).reduce((s,v)=>s+v,0);
  const diff=Math.abs(splitSum-b.amount);
  const cur=getCurrency(b.currency);
  const tr=document.getElementById(`split-total-${id}`);
  if (tr) tr.cells[1].innerHTML=`${cur.symbol}${splitSum.toLocaleString()}`+
    (b.currency!=='JPY'?`<div class="jpy-hint active">≈ ¥${toJPY(splitSum,b.currency,b.rate).toLocaleString()}</div>`:'')+
    (diff>1?`<div style="color:var(--red);font-size:11px;">（差額 ${cur.symbol}${Math.round(diff)}）</div>`:'');
  save();
}

// ── Calculate ──────────────────────────────────────────────────────────
function calculate() {
  // 会計ごとに通貨が異なるため、精算は会計単位でbalanceを管理
  // まず全会計をJPYに換算した total balance を計算
  const paidJPY={}, owedJPY={};
  members.forEach(m=>{ paidJPY[m.name]=0; owedJPY[m.name]=0; });

  // 会計ごとの balance も保持（精算内訳用）
  const billBalances = bills.map(b=>{
    const paid={}, owed={};
    members.forEach(m=>{ paid[m.name]=0; owed[m.name]=0; });
    if (b.amount && b.payer && members.find(m=>m.name===b.payer)) {
      paid[b.payer]+=b.amount;
      paidJPY[b.payer]+=toJPY(b.amount,b.currency,b.rate);
    }
    const splits=computeSplits(b);
    Object.entries(splits).forEach(([n,v])=>{
      if (members.find(m=>m.name===n)) {
        owed[n]+=v;
        owedJPY[n]+=toJPY(v,b.currency,b.rate);
      }
    });
    return {bill:b, paid, owed};
  });

  const balanceJPY={};
  members.forEach(m=>{ balanceJPY[m.name]=(paidJPY[m.name]||0)-(owedJPY[m.name]||0); });

  renderSummary(paidJPY, owedJPY, balanceJPY);
  renderTransfers(minimizeTransfers(balanceJPY), billBalances);
  const sec=document.getElementById('summarySection');
  sec.style.display='';
  sec.scrollIntoView({behavior:'smooth',block:'start'});
}

function minimizeTransfers(balance) {
  const cred=[],debt=[];
  Object.entries(balance).forEach(([n,v])=>{
    if (v> 0.5) cred.push({name:n,amt:v});
    if (v<-0.5) debt.push({name:n,amt:-v});
  });
  cred.sort((a,b)=>b.amt-a.amt); debt.sort((a,b)=>b.amt-a.amt);
  const transfers=[];
  let ci=0,di=0;
  while(ci<cred.length&&di<debt.length){
    const c=cred[ci],d=debt[di],amt=Math.min(c.amt,d.amt);
    transfers.push({from:d.name,to:c.name,amtJPY:Math.round(amt)});
    c.amt-=amt; d.amt-=amt;
    if(c.amt<0.5)ci++; if(d.amt<0.5)di++;
  }
  return transfers;
}

function renderSummary(paid,owed,balance) {
  const grid=document.getElementById('summaryGrid');
  grid.innerHTML='';
  members.forEach(m=>{
    const net=Math.round(balance[m.name]);
    const cls=net>0?'net-positive':net<0?'net-negative':'net-zero';
    const lbl=net>0?'受け取り':net<0?'支払い':'精算不要';
    const card=document.createElement('div');
    card.className='member-summary-card';
    card.innerHTML=`
      <div class="member-name-lbl">
        <span style="width:22px;height:22px;display:inline-flex;">${getAnimalSvg(m.animalIdx,22,'var(--amber)')}</span>
        ${esc(m.name)}
      </div>
      <div class="summary-row"><span class="lbl">立替払い（円換算）</span><span class="val">¥${Math.round(paid[m.name]||0).toLocaleString()}</span></div>
      <div class="summary-row"><span class="lbl">割り勘負担（円換算）</span><span class="val">¥${Math.round(owed[m.name]||0).toLocaleString()}</span></div>
      <div class="net-amount ${cls}"><span>${lbl}</span><span>¥${Math.abs(net).toLocaleString()}</span></div>`;
    grid.appendChild(card);
  });
}

function renderTransfers(transfers, billBalances) {
  lastTransfers=transfers;
  const list=document.getElementById('transferList');
  const wrap=document.getElementById('shareResultWrap');
  if(!transfers.length){
    list.innerHTML='<div class="no-transfer">✅ 全員精算済みです！</div>';
    if(wrap) wrap.style.display='none';
    return;
  }
  list.innerHTML='';

  // 通貨ごとの内訳を表示
  transfers.forEach((t,i)=>{
    const item=document.createElement('div');
    item.className='transfer-item'; item.style.animationDelay=`${i*0.06}s`;
    const fa=memberAnimal(t.from),ta=memberAnimal(t.to);

    // 外貨内訳（通貨ごとにまとめる）
    const currencyLines=[];
    billBalances.forEach(bb=>{
      const b=bb.bill;
      if (b.currency==='JPY') return;
      const fromOwes=(bb.owed[t.from]||0)-(bb.paid[t.from]||0);
      const toOwes  =(bb.owed[t.to]  ||0)-(bb.paid[t.to]  ||0);
      if (fromOwes>0.5&&toOwes<-0.5) {
        const amt=Math.min(fromOwes,Math.abs(toOwes));
        currencyLines.push(`${fmtCurrency(Math.round(amt*10)/10,b.currency)}`);
      }
    });
    const extraCur=currencyLines.length?`<div style="font-size:11px;color:var(--muted);margin-top:2px;">${currencyLines.join(' + ')}</div>`:'';

    item.innerHTML=`
      <span class="transfer-from"><span class="t-animal">${getAnimalSvg(fa,16,'#fff')}</span>${esc(t.from)}</span>
      <span class="transfer-arrow">→</span>
      <span class="transfer-to"><span class="t-animal">${getAnimalSvg(ta,16,'#fff')}</span>${esc(t.to)}</span>
      <div style="margin-left:auto;text-align:right;">
        <div class="transfer-amount">¥${t.amtJPY.toLocaleString()}</div>
        ${extraCur}
      </div>`;
    list.appendChild(item);
  });
  if(wrap) wrap.style.display='';
}

// ── Share ──────────────────────────────────────────────────────────────
function buildShareText() {
  const total=bills.reduce((s,b)=>s+toJPY(b.amount,b.currency,b.rate),0);
  const titleStr=eventTitle?'「'+eventTitle+'」':'';
  const lines=['🍺割り勘精算 '+titleStr,' 合計: ¥'+Math.round(total).toLocaleString(),''];
  if(!lastTransfers.length){ lines.push('✅ 全員精算済み！'); }
  else { lastTransfers.forEach(t=>lines.push(`${t.from} → ${t.to} ¥${t.amtJPY.toLocaleString()}`)); }
  lines.push('── powered by BILL SPLITTER ──');
  return lines.join('\n');
}
function shareResult() {
  const text=buildShareText();
  if (navigator.share) { navigator.share({title:'割り勘精算',text,url:location.href}).catch(()=>{}); return; }
  function showCopied(){const el=document.getElementById('resultCopied');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
  if (navigator.clipboard&&navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(showCopied).catch(()=>resultFallback(text,showCopied)); }
  else resultFallback(text,showCopied);
}
function resultFallback(text,cb){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.cssText='position:fixed;top:-999px;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  if(document.execCommand('copy'))cb();
  else prompt('精算結果をコピーしてシェアしてください:',text);
  document.body.removeChild(ta);
}

// ── Utils ──────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>
